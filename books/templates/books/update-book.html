{% extends 'books/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <!-- Go back to book details page -->
        <button onclick="history.back()" class="my-3 btn btn-outline-primary btn-sm">Go Back</button>
        <div class="card shadow-lg">
            <div class="card-body">

                <!-- Form for adding a book -->
                <form method="POST" enctype="multipart/form-data" action="">
                    <!-- this is for securing the form from malicious attacks -->
                    {% csrf_token %}
                    {{ form|crispy }}

                    <!-- Submit button -->
                    <button type="submit" class="btn btn-primary btn-block mb-4">Update Book</button>
                </form>
            </div>     
        </div>
    </div>
</div>
{% endblock %}
