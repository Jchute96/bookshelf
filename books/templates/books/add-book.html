{% extends 'books/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <button onclick="history.back()" class="my-3 btn btn-outline-primary btn-sm">Go Back</button>

        <!-- Google Books Search -->
        <div class="mb-3">
            <label class="form-label font-weight-bold">Find a Book</label>
            <div class="input-group">
                <!-- Use the id for javascript to read -->
                <input type="text" id="google-search" class="form-control"  placeholder="Search by title or author...">
                <button class="btn btn-primary" id="search-btn">Search</button>
            </div>
        </div>

        <!-- Search results appear here -->
        <div id="search-results" class="mb-3"></div>

        <div class="card shadow-lg">
            <div class="card-body">
                <!-- the form for adding a book -->
                <form method="POST" enctype="multipart/form-data" action="">
                    <!-- this is for securing the form from malicious attacks -->
                    {% csrf_token %}
                    <p class="text-muted"><small><span style="color: red;">*</span> Required fields</small></p>
                    <!-- this is the label and input for the Title -->
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Book Title <span style="color: red;">*</span></label>
                        <input required type="text" name="title" id="title" class="form-control" placeholder="Enter Title">
                    </div>
                    <!-- this is the label and input for the Author -->
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Author <span style="color: red;">*</span></label>
                        <input required type="text" name="author" id="author" class="form-control" placeholder="Enter Author">
                    </div>

                    <!-- this is the label and input for the Genre -->
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Genre <span style="color: red;">*</span></label>
                        <select required name="genre" id="genre" class="form-control">
                            <option value="">Select Genre</option>
                            <option value="fiction">Fiction</option>
                            <option value="nonfiction">Non-Fiction</option>
                            <option value="mystery">Mystery</option>
                            <option value="scifi">Science Fiction</option>
                            <option value="fantasy">Fantasy</option>
                            <option value="thriller">Thriller</option>
                            <option value="romance">Romance</option>
                            <option value="biography">Biography</option>
                            <option value="history">History</option>
                            <option value="selfhelp">Self-Help</option>
                        </select>
                    </div>

                    <!-- This is the label and input options for the reading status -->
                     <div class="mb-3">
                        <label class="form-label font-weight-bold">Reading Status <span style="color: red;">*</span></label>
                        <select required name="status" class="form-control">
                            <option value="">Select Reading Status</option>
                            <option value="currently_reading">Currently Reading</option>
                            <option value="want_to_read">Want to Read</option>
                            <option value="finished">Finished</option>
                        </select>
                     </div>
                    
                    <!-- this is the label and input for the Rating -->
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Rating (1-5)</label>
                        <input type="number" name="rating" class="form-control" placeholder="Enter Rating" min="1" max="5">
                    </div>
                    <!-- this is the label and input for the Review -->
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Review</label>
                        <textarea name="review" class="form-control" rows="4" placeholder="Write your review here..."></textarea>
                    </div>
                    <!-- this is the label and input for the Date Finished -->
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Date Finished</label>
                        <input type="date" name="date_finished" class="form-control">
                    </div>
                    <!-- label and input for the purchase link -->
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Purchase Link</label>
                        <input type="url" name="purchase_link" id="purchase_link" class="form-control" placeholder="https://example.com/book">
                    </div>

                    <!-- Hidden field to store google books image url for cloudinary upload -->
                     <input type="hidden" name="image_url" id="image_url" value="">

                    <!-- this is the label and input for the Image -->
                    <div class="mb-3" id="image-upload-section">
                        <label class="form-label font-weight-bold">Upload Image:</label>
                        <input type="file" name="image" id="image" class="form-control" />
                    </div>

                    <!-- Shown when a book cover is selected from Google Books search -->
                    <div class="mb-3 d-none" id="image-selected-section">
                        <label class="form-label font-weight-bold">Upload Image:</label>
                        <div>
                            Book image added — <a href="#" id="remove-image-btn" class="text-danger">Remove image</a>
                        </div>
                    </div>
                    <!-- Submit button -->
                    <button type="submit" class="btn btn-primary btn-block mb-4">Add Book</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Function that takes genres from the google search books and maps it to the genre options for BookShelf
    function mapGenre(genres) {
        // If there were no genres leave the option blank
        if (!genres || genres.length == 0) return '';

        // Take the first genre that the Google search returns and make it lowercase
        const genre = genres[0].toLowerCase();
        
        // Map the genre to the correct genre option
        if (genre.includes('nonfiction') || genre.includes('non-fiction')) return 'nonfiction';
        if (genre.includes('science fiction') || genre.includes('sci-fi')) return 'scifi';
        if (genre.includes('mystery')) return 'mystery';
        if (genre.includes('fantasy')) return 'fantasy';
        if (genre.includes('history')) return 'history';
        if (genre.includes('thriller')) return 'thriller';
        if (genre.includes('romance')) return 'romance';
        if (genre.includes('biography')) return 'biography';
        if (genre.includes('selfhelp') || genre.includes('self-help')) return 'selfhelp';
        if (genre.includes('fiction')) return 'fiction';

        // Do not pick an option if genre doesn't match any of the options
        return '';
    }

    // Function that performs the google books api search
    function performSearch() {
        // Get what the user typed in the search box
        const query = document.getElementById('google-search').value;
        
        // Get the results div so we can display the results in it
        const resultsDiv = document.getElementById('search-results');
        
        // Show a loading message while we wait for results
        resultsDiv.innerHTML = '<p class="text-muted">Searching...</p>';
        
        // Call the Django endpoint set up in views
        fetch(`/books/api/search-google-books/?search=${query}`)
            .then(response => response.json())
            .then(data => {
                // If there was an error with the search display the error message
                if (data.error) {
                    resultsDiv.innerHTML = `<p class="text-danger">${data.error}</p>`;
                    return;
                }
                // If there are no results display a message saying no results found
                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<p class="text-muted">No results found.</p>';
                    return;
                }
                // Clear the loading message
                resultsDiv.innerHTML = '';
                
                // Loop through search results and build HTML for each book
                data.results.forEach(book => {
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <div class="card mb-2" style="cursor: pointer;">
                            <div class="card-body d-flex align-items-center gap-3">
                                <img src="${book.small_image || ''}" style="width:50px; height:70px; object-fit:cover;">
                                <div>
                                    <strong>${book.title}</strong><br>
                                    <small>${book.authors}</small>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // Fill out the add book form with book data when a book result is clicked
                    div.addEventListener('click', function() {
                        document.getElementById('title').value = book.title;
                        document.getElementById('author').value = book.authors;
                        document.getElementById('purchase_link').value = book.purchase_link || '';
                        document.getElementById('image_url').value = book.image || '';
                        document.getElementById('genre').value = mapGenre(book.genres);
                        // Clear results after selection
                        resultsDiv.innerHTML = '';
                        // Show image selected confirmation message and hide file upload option
                        if (book.image) {
                            document.getElementById('image-upload-section').classList.add('d-none');
                            document.getElementById('image-selected-section').classList.remove('d-none');
                        }
                    });
                    
                    // Add the new resulting book display to the results area
                    resultsDiv.appendChild(div);
                });
            });
    }

    // Run when the search button is clicked
    document.getElementById('search-btn').addEventListener('click', performSearch); 

    // Run the search when enter key is pressed
    document.getElementById('google-search').addEventListener('keydown', function(e) {
        if (e.key == 'Enter') {
            performSearch();
        }
    });

    // Remove selected image and show file upload option if remove button clicked
    document.getElementById('remove-image-btn').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('image_url').value = '';
        document.getElementById('image-selected-section').classList.add('d-none');
        document.getElementById('image-upload-section').classList.remove('d-none');
    });
</script>
{% endblock %}
